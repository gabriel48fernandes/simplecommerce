<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>SimpleCommerce</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">SimpleCommerce</div>

        <input type="text" placeholder="Buscar produtos..." class="search" />

        <div class="icons">
            👤 🛒
        </div>
    </header>

    <!-- BANNER -->
    <section class="banner">
        <h2>Promoções da semana</h2>
        <p>Descontos exclusivos em diversos produtos</p>
        <button>Ver ofertas</button>
    </section>

    <div id="categorias" class="categorias-container"></div>


    <!-- PRODUTOS -->
    <section class="produtos-container" id="produtos">
        <!-- cards dinâmicos -->
    </section>

    <!-- BENEFÍCIOS -->
    <section class="beneficios">
        <div>🚚 Entrega Rápida</div>
        <div>🔒 Compra Segura</div>
        <div>💳 Pix e Cartão</div>
        <div>🔁 Troca Facilitada</div>
    </section>
    <script src="script.js"></script>
</body>

</html>
