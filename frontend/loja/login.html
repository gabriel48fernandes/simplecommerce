<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpleCommerce - Login</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="login-container">
    <!-- Left Side - Branding -->
    <div class="login-left">
      <div class="logo-section">
        <div class="logo-icon">🛍️</div>
        <h1>SimpleCommerce</h1>
        <p>Sua loja online confiável</p>
      </div>
      <div class="benefits">
        <div class="benefit-item">
          <span class="benefit-icon">✓</span>
          <p>Compra segura com criptografia</p>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">⚡</span>
          <p>Entrega rápida em todo Brasil</p>
        </div>
        <div class="benefit-item">
          <span class="benefit-icon">💳</span>
          <p>Múltiplas formas de pagamento</p>
        </div>
      </div>
    </div>

    <!-- Right Side - Login Form -->
    <div class="login-right">
      <div class="login-box">
        <h2>Bem-vindo de volta!</h2>
        <p class="login-subtitle">Entre na sua conta para continuar</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required />
            <span class="input-icon">📧</span>
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required />
            <span class="input-icon">🔐</span>
          </div>

          <div class="remember-forgot">
            <label class="remember">
              <input type="checkbox" />
              <span>Lembrar-me</span>
            </label>
            <a href="#" class="forgot-link">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="signup-link">
          Não tem conta? <a href="register.html">Crie uma agora</a>
        </div>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
