<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleCommerce - Sua Loja Online</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-container">
            <span class="logo-icon">🛍️</span>
            <div class="logo">SimpleCommerce</div>
        </div>

        <input type="text" id="buscaProduto" placeholder="🔍 Buscar produtos..." class="search" />

        <div class="icons" id="area-usuario">
        </div>
    </header>

    <!-- BANNER -->
    <section class="banner">
        <h2>Promoções da semana</h2>
        <p>Descontos exclusivos em diversos produtos</p>
        <button>Ver ofertas</button>
    </section>

    <div id="categorias" class="categorias-container"></div>


    <!-- PRODUTOS -->
    <section class="produtos-container" id="produtos">
        <!-- cards dinâmicos -->
    </section>

    <!-- BENEFÍCIOS -->
    <section class="beneficios">
        <div>🚚 Entrega Rápida</div>
        <div>🔒 Compra Segura</div>
        <div>💳 Pix e Cartão</div>
        <div>🔁 Troca Facilitada</div>
    </section>
    <script src="/script.js"></script>
</body>

</html>
