<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<link rel="stylesheet" href="style.css">


</head>

<body>

<header>
<h1>SimpleCommerce</h1>
<a class="voltar" href="/">← Voltar para a loja</a>
</header>

<main class="produto">

<div class="galeria">

<div class="miniaturas" id="miniaturas"></div>

<div class="imagem-principal">
<img id="imagemPrincipal" alt="imagem pricipal do produto">
</div>

</div>


<div class="produto-info">

<h1 id="nomeProduto"></h1>

<p id="precoProduto"></p>

<p>
Estoque: <span id="estoqueProduto" class="estoque"></span>
</p>

<button id="btnComprar">
Adicionar ao carrinho
</button>

</div>

</main>


<section class="descricao">

<h2>Descrição</h2>

<p id="descricaoProduto"></p>

</section>
<script src="script.js"></script>
<script src="produto.js"></script>

</body>
</html>
