<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Carrinho</title>
  <link rel="stylesheet" href="carrinho.css">
</head>

<body>

  <div class="carrinho-container">

    <h1>🛒 Meu Carrinho</h1>

    <div id="lista-carrinho"></div>

    <div class="frete-box">

      <h3>Calcular frete</h3>

      <input type="text" id="cep" placeholder="Digite seu CEP">

      <button onclick="calcularFrete()">
        Calcular
      </button>

      <!-- opções de frete vão aparecer aqui -->
      <div id="opcoes-frete"></div>

    </div>

    <div class="carrinho-footer">

      <div class="total" id="total-carrinho">
        Total: R$ 0,00
      </div>

      <h3>Forma de pagamento</h3>

      <select id="formaPagamento">
        <option value="pix">PIX</option>
        <option value="cartao">Cartão</option>
        <option value="boleto">Boleto</option>
      </select>

      <!-- ALTERAMOS AQUI -->
      <button onclick="iniciarPagamento()">
        Seguir para pagamento
      </button>

    </div>

    <!-- AREA PIX -->

    <div id="pagamento-pix" class="pix-area" style="display:none;">

  <div class="pix-card">

    <h2>Pagamento via PIX</h2>

    <p>Escaneie o QR Code com seu banco</p>

    <img id="pix-qrcode" />

    <textarea id="pix-copia-cola" class="pix-copia" readonly></textarea>

    <div class="pix-botoes">

      <button class="btn-pix btn-copiar" onclick="copiarPix()">
        Copiar código
      </button>

      <button class="btn-pix btn-confirmar" onclick="confirmarPagamentoPix()">
        Já paguei
      </button>

    </div>

  </div>

</div>

  </div>

  <script src="carrinho.js"></script>

</body>

</html>
