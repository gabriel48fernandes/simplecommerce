<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Carrinho</title>

<link rel="stylesheet" href="carrinho.css">

</head>

<body>

<!-- OVERLAY -->
<div id="cartOverlay" onclick="fecharCarrinho()"></div>

<!-- CARRINHO LATERAL -->
<div id="cartDrawer">

  <!-- HEADER -->
  <div class="cartHeader">

    <h2>🛒 Meu Carrinho</h2>

    <button onclick="fecharCarrinho()">
      ✕
    </button>

  </div>

  <!-- LISTA PRODUTOS -->
  <div id="lista-carrinho"></div>

  <!-- FRETE -->
  <div class="frete-box">

    <h3>Calcular frete</h3>

    <input
      type="text"
      id="cep"
      placeholder="Digite seu CEP"
    >

    <button onclick="calcularFrete()">
      Calcular
    </button>

    <div id="opcoes-frete"></div>

  </div>

  <!-- TOTAL + PAGAMENTO -->
  <div class="carrinho-footer">

    <div class="total" id="total-carrinho">
      Total: R$ 0,00
    </div>

    <h3>Forma de pagamento</h3>

    <select id="formaPagamento">

      <option value="pix">PIX</option>
      <option value="cartao">Cartão</option>
      <option value="boleto">Boleto</option>

    </select>

    <button type="button" onclick="iniciarPagamento()">
      Seguir para pagamento
    </button>

  </div>

</div>


<!-- AREA PIX -->

<div id="pagamento-pix" class="pix-area" style="display:none;">

  <div class="pix-card">

    <h2>Pagamento via PIX</h2>

    <p>Escaneie o QR Code com seu banco</p>

    <img id="pix-qrcode">

    <textarea
      id="pix-copia-cola"
      class="pix-copia"
      readonly
    ></textarea>

    <div class="pix-botoes">

      <button
        class="btn-pix btn-copiar"
        onclick="copiarPix()"
      >
        Copiar código
      </button>

      <button
        class="btn-pix btn-confirmar"
        onclick="confirmarPagamentoPix()"
      >
        Já paguei
      </button>

    </div>

  </div>

</div>


<!-- SCRIPTS -->
<script src="/script.js"></script>
<script src="/carrinho.js"></script>

</body>
</html>
